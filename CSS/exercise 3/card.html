<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        body {
            background-color: gray;
        }

        .card {
            background-color: white;
            width: 90%;
            max-width: 200px;
            height: auto;
            border-radius: 9px;
        }

        .image {
            padding: 5px;
        }

        .image img {
            border-radius: 9px 9px  0 0 ;
            width: 100%;
            height: auto;
        }

        .content p {
            font-size: 12px;
            font-family: poppins;
        }

        .content {
            padding: 7px;
        }

        .capsule span {
            border: 2px solid gray;
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 12px;
            background-color: bisque;
        }

        .capsule {
            padding: 0 12px;
        }

        .button {
            text-align: center;
            font-size: 12px;
        }
        .button button{
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 8px;
            background-color: rgb(174, 212, 199);
        }
        .content h3{
            font-size: 16px;
            margin-bottom: 5px;
        }
        .button button:hover {
    background-color: rgb(150, 200, 180);
}
    </style>
</head>

<body>
    <div class="card">
        <div class="image">
            <img src="https://images.stockcake.com/public/6/4/c/64c0bcb0-af5d-4a85-b17f-632aad836c92_large/river-boating-adventure-stockcake.jpg"
                width="154" alt="River Boating Adventure">
        </div>
        <div class="capsule">
            <span>Nature</span>
            <span>Lake</span>
        </div>
        <div class="content">
            <h3>Nature is beautiful</h3>
            <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Ipsam officiis ratione tempore maxime
                doloremque non aspernatur quae, modi, molestiae veniam, quam cum amet.</p>
        </div>
        <div class="button">
            <button>read more</button>
        </div>

    </div>
</body>

</html>
