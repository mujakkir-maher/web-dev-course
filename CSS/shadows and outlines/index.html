<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS shadows and outlines</title>
    <style>
        .box{
        border: 2px solid black;
        padding: 23px;
        box-shadow: 5px 15px 5px #70a711;
        
    }

    .text-element{
        text-shadow: 10px 5px 3px #e695f7;
    }
    </style>
</head>
<body>
    <div class="box">
        I'm a box
    </div>
    <p class="text-element">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Minima, beatae a nobis doloremque, eligendi temporibus facere, atque illum qui quibusdam saepe veritatis.
    </p>
</body>
</html>
