<form action="post">
    <label for="name">Enter your name: </label>
    <input type="text" id="name" name="username" placeholder="Enter your username"><br><br>
   
    <label for="email">Enter your Email: </label>
    <input type="email" id="email" name="useremail" placeholder="Enter email"><br><br>
    
    <label>Gender:</label>
    <input type="radio" id="gender_male" name="gender" value="male">
    <label for="gender_male">Male</label>
    <input type="radio" id="gender_female" name="gender" value="female">
    <label for="gender_female">Female</label><br><br>
    <label for="hobby">Hobbies</label>
    <input type="checkbox" name="hobby" value="reading "> Reading
    
    <input type="checkbox" name="hobby" value="sports "> Sports <br><br>
    <input type="submit" name="submit" id="submit">
    <input type="reset" name="reset" id="reset">
</form>
<h2>
    text area & select
