<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID and Classes in HTML</title>
</head>
<body>
    want to know about id and classes
    <p>id হলো একটি global attribute যা HTML document-এর ভিতরে একটি element-কে uniquely identify করার জন্য ব্যবহৃত হয়।</p>
    <p>class হলো একটি global attribute যা এক বা একাধিক element-কে একটি common group বা category হিসেবে চিহ্নিত করতে ব্যবহৃত হয়।</p>
</body>
</html>
