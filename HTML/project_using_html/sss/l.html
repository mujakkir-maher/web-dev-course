<!DOCTYPE html>
<html>
<head>
    <title>Do You Like Me?</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
            margin-top: 100px;
            background-color: #ffe6f0;
        }

        h1 {
            font-size: 40px;
        }

        button {
            padding: 10px 25px;
            font-size: 20px;
            margin: 20px;
            cursor: pointer;
            position: absolute;
        }

        #yesBtn {
            left: 45%;
            top: 50%;
            position: fixed;
        }

        #noBtn {
            left: 55%;
            top: 50%;
        }
    </style>
</head>
<body>

<h1 id="question">Do you like me? 😳</h1>

<button id="yesBtn" onclick="accepted()">Yes</button>
<button id="noBtn" onmouseover="moveButton()">No</button>

<script>
    function moveButton() {
        var x = Math.random() * window.innerWidth;
        var y = Math.random() * window.innerHeight;
        var noBtn = document.getElementById("noBtn");
        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }

    function accepted() {
        document.getElementById("question").innerText = "Thanks for accepting ❤️";
        document.getElementById("yesBtn").style.display = "none";
        document.getElementById("noBtn").style.display = "none";
    }
</script>

</body>
</html>
